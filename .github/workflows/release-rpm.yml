name: Build RPM Package

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to build (without v prefix)"
        required: false

permissions:
  contents: write

jobs:
  rpm:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.version }}" ]; then
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build packages in openSUSE Tumbleweed container
        run: |
          set -euo pipefail
          docker run --rm \
            -e LIMUX_VERSION="${{ steps.version.outputs.version }}" \
            -v "$GITHUB_WORKSPACE:/workspace" \
            -w /workspace \
            opensuse/tumbleweed:latest \
            bash -lc '
              set -euo pipefail

              zypper refresh
              zypper install -y --no-confirm \
                binutils \
                cairo-gobject-devel \
                curl \
                dpkg \
                gcc \
                gcc-c++ \
                gdk-pixbuf-devel \
                glib2-devel \
                gobject-introspection-devel \
                gzip \
                gtk4-devel \
                libadwaita-devel \
                libepoxy-devel \
                libsoup-devel \
                make \
                pango-devel \
                pkg-config \
                rpm-build \
                ruby \
                tar \
                webkit2gtk4-devel \
                xz

              ZIG_VERSION=0.15.2
              curl -L "https://ziglang.org/download/${ZIG_VERSION}/zig-x86_64-linux-${ZIG_VERSION}.tar.xz" -o /tmp/zig.tar.xz
              tar -xf /tmp/zig.tar.xz -C /tmp
              export PATH="/tmp/zig-x86_64-linux-${ZIG_VERSION}:$PATH"

              curl --proto "=https" --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --profile minimal --default-toolchain stable
              . "$HOME/.cargo/env"

              ./scripts/package.sh "$LIMUX_VERSION"
            '

      - name: Resolve RPM path
        id: rpm
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"
          ARCH="$(uname -m)"
          RPM_ARCH="x86_64"
          [ "$ARCH" = "aarch64" ] && RPM_ARCH="aarch64"
          RPM_OUTPUT="dist/limux-${VERSION}-1.${RPM_ARCH}.rpm"
          test -f "$RPM_OUTPUT"
          echo "rpm_path=$RPM_OUTPUT" >> "$GITHUB_OUTPUT"
          echo "rpm_arch=$RPM_ARCH" >> "$GITHUB_OUTPUT"

      - name: Upload RPM to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.rpm.outputs.rpm_path }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload RPM as artifact
        uses: actions/upload-artifact@v4
        with:
          name: limux-rpm-${{ steps.version.outputs.version }}
          path: ${{ steps.rpm.outputs.rpm_path }}
          retention-days: 30
